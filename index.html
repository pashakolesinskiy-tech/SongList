<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Druisk</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="js/app.js"></script>
  <script>
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;

      setTimeout(() => {
        if (localStorage.getItem('druisk-install-dismissed')) return;

        const banner = document.createElement('div');
        banner.className = 'install-banner';
        banner.innerHTML = `
          <div class="install-icon"><img src="icons/icon-96.png" alt="Druisk"></div>
          <div class="install-text">
            <p class="install-title">Установить Druisk</p>
            <p class="install-sub">Быстрый доступ к песням с главного экрана</p>
          </div>
          <div class="install-actions">
            <button id="install-ok" class="btn btn-primary btn-sm">Установить</button>
            <button id="install-dismiss" class="btn btn-secondary btn-sm">Позже</button>
          </div>
        `;
        document.body.appendChild(banner);

        document.getElementById('install-ok').addEventListener('click', () => {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(choice => {
            if (choice.outcome === 'accepted') {
              banner.remove();
            }
            deferredPrompt = null;
          });
        });

        document.getElementById('install-dismiss').addEventListener('click', () => {
          localStorage.setItem('druisk-install-dismissed', '1');
          banner.remove();
        });
      }, 3000);
    });

    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      const banner = document.querySelector('.install-banner');
      if (banner) banner.remove();
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              const toast = document.createElement('div');
              toast.className = 'update-toast';
              toast.innerHTML = '<span>Доступно обновление</span><button id="update-ok">Обновить</button>';
              document.body.appendChild(toast);
              document.getElementById('update-ok').addEventListener('click', () => {
                newSW.postMessage({ type: 'SKIP_WAITING' });
                toast.remove();
                window.location.reload();
              });
            }
          });
        });
      });
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }
  </script>
</body>
</html>
